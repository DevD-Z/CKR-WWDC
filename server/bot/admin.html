<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CKR Admin</title>
<meta name="color-scheme" content="dark">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: system-ui, -apple-system, sans-serif;
  background: #0f0a08;
  color: #f0e6dc;
  min-height: 100vh;
}
header {
  background: #1a0f0a;
  padding: 16px 24px;
  border-bottom: 1px solid #3a2518;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
header h1 { font-size: 20px; color: #f5c77e; }
header span { color: #887060; font-size: 13px; }
#login-screen, #admin-screen { max-width: 900px; margin: 0 auto; padding: 24px 16px; }
.card {
  background: #1a0f0a;
  border: 1px solid #3a2518;
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 20px;
}
.card h2 { font-size: 16px; color: #f5c77e; margin-bottom: 12px; }
label { display: block; font-size: 13px; color: #a09080; margin-bottom: 4px; margin-top: 10px; }
input, select {
  width: 100%;
  padding: 10px 12px;
  background: #0f0a08;
  border: 1px solid #3a2518;
  border-radius: 8px;
  color: #f0e6dc;
  font-size: 14px;
}
input:focus { outline: none; border-color: #f5c77e; }
button {
  padding: 10px 20px;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  cursor: pointer;
  font-weight: 600;
}
.btn-primary { background: #c8893a; color: #1a0f0a; }
.btn-primary:hover { background: #dda04e; }
.btn-danger { background: #a04030; color: #fff; }
.btn-danger:hover { background: #c05040; }
.btn-success { background: #3a8a50; color: #fff; }
.btn-success:hover { background: #4aa060; }
.btn-sm { padding: 6px 14px; font-size: 13px; }
.mt-10 { margin-top: 10px; }
.mt-16 { margin-top: 16px; }
.flex { display: flex; gap: 10px; align-items: end; }
.flex .grow { flex: 1; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
@media (max-width: 600px) { .grid2 { grid-template-columns: 1fr; } }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th, td { padding: 8px 10px; text-align: left; border-bottom: 1px solid #2a1a10; }
th { color: #a09080; font-weight: 500; }
tr:hover { background: #1f140e; }
.badge {
  display: inline-block; padding: 2px 10px; border-radius: 10px; font-size: 11px;
  background: #3a2518; color: #f5c77e;
}
.badge.admin { background: #3a2a10; color: #f5c77e; }
.hidden { display: none !important; }
pre { font-size: 12px; color: #a09080; max-height: 300px; overflow: auto; }
#status { font-size: 13px; padding: 8px 12px; border-radius: 8px; margin-bottom: 12px; }
#status.ok { background: #1a3a20; color: #8aca90; }
#status.err { background: #3a1810; color: #e08060; }
#status.load { background: #2a1a10; color: #d0b080; }
.nav { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
.nav button { background: #2a1a10; color: #c0a890; }
.nav button.active { background: #c8893a; color: #1a0f0a; }
.page { display: none; }
.page.active { display: block; }
</style>
</head>
<body>

<header>
  <div><h1>CKR Admin</h1><span>Management Dashboard</span></div>
  <div id="header-info">
    <span id="header-user" class="hidden" style="color:#a09080;margin-right:12px;"></span>
    <button id="logout-btn" class="btn-sm btn-danger hidden">ออกจากระบบ</button>
  </div>
</header>

<div id="login-screen">
  <div class="card" style="max-width:400px;margin:60px auto;">
    <h2>เข้าสู่ระบบ Admin</h2>
    <div id="login-status"></div>
    <label>Username</label>
    <input type="text" id="login-user" value="admin" autocomplete="off">
    <label>Password</label>
    <input type="password" id="login-pass" autocomplete="off">
    <button class="btn-primary mt-16" id="login-btn" style="width:100%">เข้าสู่ระบบ</button>
  </div>
</div>

<div id="admin-screen" class="hidden">
  <div class="nav" id="nav-tabs">
    <button class="active" data-page="dashboard">📊 Dashboard</button>
    <button data-page="create">📝 สร้าง User</button>
    <button data-page="tokens">💰 จัดการ Token</button>
    <button data-page="lookup">👤 ค้นหา User</button>
  </div>

  <div id="page-dashboard" class="page active">
    <div class="card">
      <h2>👥 Users ทั้งหมด</h2>
      <div id="dash-status"></div>
      <div id="dash-table"></div>
    </div>
    <div class="card">
      <h2>🏥 สถานะ API</h2>
      <div id="health-info"></div>
    </div>
  </div>

  <div id="page-create" class="page">
    <div class="card" style="max-width:450px;">
      <h2>📝 สร้าง User ใหม่</h2>
      <div id="create-status"></div>
      <label>Username</label>
      <input type="text" id="c-username">
      <label>Password</label>
      <input type="text" id="c-password">
      <label>Token เริ่มต้น</label>
      <input type="number" id="c-tokens" value="0" min="0">
      <button class="btn-success mt-16" id="create-btn">สร้าง User</button>
    </div>
  </div>

  <div id="page-tokens" class="page">
    <div class="card" style="max-width:450px;">
      <h2>💰 จัดการ Token</h2>
      <div id="token-status"></div>
      <label>Username</label>
      <input type="text" id="t-username">
      <label>จำนวน Token</label>
      <input type="number" id="t-amount" value="10" min="1">
      <div class="flex mt-10">
        <button class="btn-success btn-sm" id="t-add-btn">➕ เติม</button>
        <button class="btn-danger btn-sm" id="t-remove-btn">🔻 หัก</button>
      </div>
    </div>
  </div>

  <div id="page-lookup" class="page">
    <div class="card" style="max-width:450px;">
      <h2>👤 ค้นหา User</h2>
      <div id="lookup-status"></div>
      <label>Username</label>
      <input type="text" id="l-username">
      <button class="btn-primary mt-10" id="lookup-btn">ค้นหา</button>
      <div id="lookup-result" class="mt-10"></div>
    </div>
  </div>
</div>

<script>
const API = window.CKR_CONFIG?.API_BASE || "https://ckr-wwdc-x0pe.onrender.com";
let TOKEN = null;

const $ = id => document.getElementById(id);
const status = (el, msg, type) => { el.textContent = msg; el.className = type || ''; };

async function api(method, path, body) {
  const headers = { 'Content-Type': 'application/json' };
  if (TOKEN) headers['Authorization'] = 'Bearer ' + TOKEN;
  const res = await fetch(API + path, { method, headers, body: body ? JSON.stringify(body) : undefined });
  const data = await res.json();
  if (!res.ok) throw new Error(data?.detail || data?.reason || data?.error || res.statusText);
  return data;
}

// ── Login ──
$('login-btn').onclick = async () => {
  status($('login-status'), 'กำลังเข้าสู่ระบบ...', 'load');
  try {
    const data = await api('POST', '/api/auth/login', {
      username: $('login-user').value.trim(),
      password: $('login-pass').value
    });
    TOKEN = data.access_token;
    $('login-screen').classList.add('hidden');
    $('admin-screen').classList.remove('hidden');
    $('header-user').textContent = '👤 ' + (data.profile?.username || 'admin');
    $('header-user').classList.remove('hidden');
    $('logout-btn').classList.remove('hidden');
    status($('login-status'), '', '');
    refreshDashboard();
  } catch (e) {
    status($('login-status'), '❌ ' + e.message, 'err');
  }
};

$('login-pass').addEventListener('keydown', e => { if (e.key === 'Enter') $('login-btn').click(); });

$('logout-btn').onclick = () => {
  TOKEN = null;
  $('admin-screen').classList.add('hidden');
  $('login-screen').classList.remove('hidden');
  $('header-user').classList.add('hidden');
  $('logout-btn').classList.add('hidden');
};

// ── Navigation ──
document.querySelectorAll('#nav-tabs button').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('#nav-tabs button').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    $('page-' + btn.dataset.page).classList.add('active');
    if (btn.dataset.page === 'dashboard') refreshDashboard();
  };
});

// ── Dashboard ──
async function refreshDashboard() {
  status($('dash-status'), 'กำลังโหลด...', 'load');
  try {
    const data = await api('GET', '/api/admin/users');
    const users = data.users || [];
    let html = `<table><thead><tr><th>Username</th><th>Tokens</th><th>Role</th><th>Created</th></tr></thead><tbody>`;
    users.forEach(u => {
      const role = `<span class="badge ${u.role}">${u.role || 'normal'}</span>`;
      const created = u.created_at ? u.created_at.slice(0, 10) : '—';
      html += `<tr><td><b>${u.username || '?'}</b></td><td>${u.token_balance ?? 0}</td><td>${role}</td><td>${created}</td></tr>`;
    });
    html += '</tbody></table>';
    $('dash-table').innerHTML = html;
    status($('dash-status'), `✅ ${users.length} users`, 'ok');
  } catch (e) {
    status($('dash-status'), '❌ ' + e.message, 'err');
  }

  try {
    const h = await fetch(API + '/api/health').then(r => r.json());
    $('health-info').innerHTML = `
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:13px;">
        <span>Service: <b>${h.service}</b></span>
        <span>Farm: <b>${h.farm_busy ? '🔴 ไม่ว่าง' : '🟢 ว่าง'}</b></span>
        <span>Supabase: <b>${h.supabase_configured ? '✅' : '❌'}</b></span>
        <span>Service Role: <b>${h.service_role_configured ? '✅' : '❌'}</b></span>
      </div>
    `;
  } catch (e) {
    $('health-info').textContent = '❌ ' + e.message;
  }
}

// ── Create User ──
$('create-btn').onclick = async () => {
  status($('create-status'), 'กำลังสร้าง...', 'load');
  try {
    const data = await api('POST', '/api/admin/create-user', {
      username: $('c-username').value.trim(),
      password: $('c-password').value,
      initial_tokens: parseInt($('c-tokens').value) || 0
    });
    status($('create-status'), `✅ สร้าง ${data.username} สำเร็จ (${data.token_balance} tokens)`, 'ok');
    $('c-username').value = '';
    $('c-password').value = '';
    $('c-tokens').value = '0';
  } catch (e) {
    status($('create-status'), '❌ ' + e.message, 'err');
  }
};

// ── Tokens ──
async function tokenAction(amount) {
  status($('token-status'), 'กำลังดำเนินการ...', 'load');
  try {
    const data = await api('POST', '/api/admin/add-tokens', {
      query: $('t-username').value.trim(),
      amount
    });
    const act = amount > 0 ? 'เติม' : 'หัก';
    status($('token-status'), `✅ ${act} ${data.username} สำเร็จ (Balance: ${data.token_balance})`, 'ok');
  } catch (e) {
    status($('token-status'), '❌ ' + e.message, 'err');
  }
}
$('t-add-btn').onclick = () => tokenAction(parseInt($('t-amount').value) || 0);
$('t-remove-btn').onclick = () => tokenAction(-(parseInt($('t-amount').value) || 0));

// ── Lookup ──
$('lookup-btn').onclick = async () => {
  status($('lookup-status'), 'กำลังค้นหา...', 'load');
  try {
    const data = await api('GET', '/api/admin/lookup?q=' + encodeURIComponent($('l-username').value.trim()));
    if (data.ok) {
      $('lookup-result').innerHTML = `
        <div style="background:#1f140e;border-radius:8px;padding:14px;font-size:13px;">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;">
            <span>ID: <code style="color:#a09080;font-size:11px;">${data.id}</code></span>
            <span>Username: <b>${data.username || '?'}</b></span>
            <span>Display: ${data.display_name || '—'}</span>
            <span>Role: ${data.role}</span>
            <span>Tokens: <b style="color:#f5c77e;">${data.token_balance ?? 0}</b></span>
            <span>Created: ${data.created_at ? data.created_at.slice(0, 10) : '?'}</span>
          </div>
        </div>
      `;
      status($('lookup-status'), '', '');
    } else {
      status($('lookup-status'), '❌ ไม่พบ user', 'err');
    }
  } catch (e) {
    status($('lookup-status'), '❌ ' + e.message, 'err');
  }
};
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>hotdog. — Dashboard</title>
  <meta name="color-scheme" content="dark" />
  <meta name="theme-color" content="#0f172a" />
  <link rel="icon" href="assets/znight.png" type="image/png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    :root { --font: 'Inter', 'Prompt', 'Segoe UI', sans-serif; --display: 'Inter', 'Baloo 2', sans-serif; }
    .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 860px) { .admin-grid { grid-template-columns: 1fr; } }
    .admin-table { width: 100%; font-size: 0.82rem; border-collapse: collapse; }
    .admin-table th { text-align: left; padding: 10px 10px; color: #64748b; font-weight: 600; border-bottom: 1px solid rgba(148,163,184,0.12); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .admin-table td { padding: 10px; border-bottom: 1px solid rgba(148,163,184,0.06); color: #f1f5f9; }
    .admin-table tr:hover td { background: rgba(14,165,233,0.04); }
    .badge { display: inline-block; padding: 2px 10px; border-radius: 999px; font-size: 0.7rem; font-weight: 600; background: rgba(51,65,85,0.6); color: #38bdf8; }
    .badge.admin { background: rgba(14,165,233,0.2); color: #0ea5e9; }
    .nav-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 20px; background: rgba(30,41,59,0.5); border-radius: 14px; padding: 6px; }
    .nav-tabs button { background: transparent; color: #64748b; border: none; padding: 8px 16px; border-radius: 10px; cursor: pointer; font-size: 0.82rem; font-family: inherit; font-weight: 500; transition: all .15s; }
    .nav-tabs button:hover { color: #f1f5f9; background: rgba(255,255,255,0.05); }
    .nav-tabs button.active { background: rgba(14,165,233,0.15); color: #38bdf8; }
    .page { display: none; }
    .page.active { display: block; }
    .admin-status { font-size: 0.8rem; padding: 8px 12px; border-radius: 8px; margin-bottom: 12px; }
    .admin-status.ok { background: rgba(34,211,238,0.1); color: #22d3ee; }
    .admin-status.err { background: rgba(248,113,113,0.1); color: #f87171; }
    .admin-status.load { background: rgba(14,165,233,0.1); color: #38bdf8; }
    .edit-inline { display: flex; gap: 4px; align-items: center; }
    .edit-inline select, .edit-inline input { padding: 4px 8px; font-size: 0.8rem; background: rgba(15,23,42,0.8); border: 1px solid rgba(148,163,184,0.15); border-radius: 6px; color: #f1f5f9; }
    .edit-inline input { width: 70px; }
    .edit-inline button { padding: 4px 10px; font-size: 0.75rem; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
    .btn-save { background: #0ea5e9; color: #fff; }
    .btn-cancel { background: rgba(51,65,85,0.6); color: #94a3b8; }
    .btn-edit { background: none; border: none; color: #38bdf8; cursor: pointer; font-size: 0.8rem; padding: 4px 8px; border-radius: 6px; }
    .btn-edit:hover { background: rgba(14,165,233,0.1); }
    .lookup-card { background: rgba(30,41,59,0.6); border-radius: 12px; padding: 16px; font-size: 0.82rem; border: 1px solid rgba(148,163,184,0.1); }
    .lookup-card .row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 16px; }
    .lookup-card .row span { padding: 4px 0; }
    .lookup-card code { color: #64748b; font-size: 0.7rem; }
    .health-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 0.82rem; }
    .health-grid span { padding: 6px 10px; background: rgba(0,0,0,0.2); border-radius: 8px; }
    .health-grid b { color: #f1f5f9; }
    .inline-flex { display: flex; gap: 10px; align-items: end; flex-wrap: wrap; }
    .mt-10 { margin-top: 10px; }
    .mt-16 { margin-top: 16px; }
    .admin-hero { text-align: center; padding: 20px 0; }
    .admin-hero h1 { font-family: var(--display); font-size: 2rem; font-weight: 800; margin: 0 0 6px; background: linear-gradient(180deg, #e0f2fe 0%, #0ea5e9 55%, #0284c7 100%); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .admin-hero p { color: #64748b; margin: 0; font-size: 0.9rem; }
    .section-title { font-family: var(--display); font-size: 1.1rem; font-weight: 700; margin: 0 0 12px; color: #f1f5f9; display: flex; align-items: center; gap: 8px; }
    .section-title img { width: 22px; height: 22px; }
    .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
    .status-dot.green { background: #22d3ee; box-shadow: 0 0 8px rgba(34,211,238,0.4); }
    .status-dot.red { background: #f87171; box-shadow: 0 0 8px rgba(248,113,113,0.4); }
    .status-dot.yellow { background: #fbbf24; box-shadow: 0 0 8px rgba(251,191,36,0.4); }
  </style>
</head>
<body>
  <div class="bakery-bg" aria-hidden="true">
    <div class="bakery-glow bakery-glow-a"></div>
    <div class="bakery-glow bakery-glow-b"></div>
    <div class="crumb-pattern"></div>
  </div>

  <header class="topbar">
    <a class="brand" href="index.html">
      <img class="brand-logo" src="assets/znight.png" width="44" height="44" alt="" />
      <span class="brand-text">
        <span class="brand-title">hotdog.</span>
        <span class="brand-sub">Management Dashboard</span>
      </span>
    </a>
    <div class="topbar-actions">
      <span id="header-user" class="hidden" style="color:#94a3b8;font-size:0.8rem;margin-right:12px;"></span>
      <button type="button" id="logout-btn" class="btn btn-candy btn-logout hidden">Logout</button>
    </div>
  </header>

  <main class="shell">
    <!-- LOGIN -->
    <section id="login-view" class="view">
      <div style="max-width:400px;margin:0 auto;padding:40px 0">
        <div class="admin-hero">
          <img src="assets/znight.png" width="100" height="100" alt="" style="margin:0 auto 16px;filter:drop-shadow(0 0 20px rgba(14,165,233,0.4))" />
          <h1>hotdog.</h1>
          <p>Management Dashboard — Admin only</p>
        </div>
        <div class="panel" style="max-width:100%">
          <h2 class="panel-title">Sign In</h2>
          <p class="panel-hint">Enter admin credentials</p>
          <label class="field">
            <span>Username</span>
            <input id="login-user" type="text" value="admin" autocomplete="off" />
          </label>
          <label class="field">
            <span>Password</span>
            <input id="login-pass" type="password" autocomplete="off" />
          </label>
          <button class="btn btn-candy mt-16" id="login-btn" style="width:100%">
            <img src="assets/icon_giftpoint.png" alt="" width="20" height="20" />
            Sign In
          </button>
          <p id="login-status" class="status" role="status"></p>
        </div>
      </div>
    </section>

    <!-- ADMIN DASHBOARD -->
    <section id="admin-view" class="view hidden">
      <div class="nav-tabs" id="nav-tabs">
        <button class="active" data-page="dashboard">Dashboard</button>
        <button data-page="tokens">Tokens</button>
        <button data-page="queue">Queue</button>
        <button data-page="health">Health</button>
      </div>

      <!-- Dashboard / Users -->
      <div id="page-dashboard" class="page active">
        <div class="section-title"><img src="assets/img_snowman_mt_01.png" alt="" /> Users</div>
        <div id="dash-status" class="admin-status"></div>
        <div class="panel" style="padding:16px;overflow-x:auto">
          <div id="dash-table"></div>
        </div>
      </div>

      <!-- Tokens -->
      <div id="page-tokens" class="page">
        <div class="admin-grid">
          <div class="panel">
            <div class="section-title" style="margin-bottom:16px"><img src="assets/coin.png" alt="" /> Token Management</div>
            <div id="token-status" class="admin-status"></div>
            <label class="field">
              <span>Username</span>
              <input type="text" id="t-username" placeholder="Enter username" />
            </label>
            <label class="field">
              <span>Amount</span>
              <input type="number" id="t-amount" value="10" min="1" />
            </label>
            <div class="inline-flex mt-10">
              <button class="btn btn-candy" id="t-add-btn" style="flex:1">Add Tokens</button>
              <button class="btn btn-candy" id="t-remove-btn" style="flex:1;background:linear-gradient(180deg,#f87171 0%,#ef4444 45%,#dc2626 100%);box-shadow:0 6px 0 #991b1b,0 12px 24px rgba(248,113,113,0.3)">Remove Tokens</button>
            </div>
          </div>
          <div class="panel">
            <div class="section-title" style="margin-bottom:16px"><img src="assets/icon_giftpoint.png" alt="" /> Voucher Settings</div>
            <div id="voucher-settings-status" class="admin-status"></div>
            <label class="field">
              <span>TrueMoney Phone</span>
              <input type="text" id="vs-phone" placeholder="0644718725" />
            </label>
            <label class="field">
              <span>Points per 1 Baht</span>
              <input type="number" id="vs-points" min="1" max="1000" placeholder="1" />
            </label>
            <button class="btn btn-candy mt-10" id="vs-save-btn" style="width:100%">Save Settings</button>
          </div>
        </div>
      </div>

      <!-- Queue -->
      <div id="page-queue" class="page">
        <div class="section-title"><img src="assets/tr_ga170.png" alt="" /> Farm Queue</div>
        <div id="queue-status" class="admin-status"></div>
        <div class="panel" style="padding:16px">
          <div id="queue-info" style="font-size:0.82rem"></div>
        </div>
      </div>

      <!-- Health -->
      <div id="page-health" class="page">
        <div class="section-title"><img src="assets/upgrade02_40_shop.png" alt="" /> System Health</div>
        <div class="panel" style="padding:16px">
          <div id="health-info" class="health-grid"></div>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <img src="assets/znight.png" alt="" width="24" height="24" />
    <p>hotdog. Panel</p>
  </footer>

  <script src="js/config.js"></script>
  <script>
    const API = window.CKR_CONFIG?.API_BASE || "https://ckr-wwdc-x0pe.onrender.com";
    let TOKEN = null;

    const $ = id => document.getElementById(id);
    const status = (el, msg, type) => { el.textContent = msg; el.className = 'admin-status ' + (type || ''); };

    async function api(method, path, body) {
      const headers = { 'Content-Type': 'application/json' };
      if (TOKEN) headers['Authorization'] = 'Bearer ' + TOKEN;
      const res = await fetch(API + path, { method, headers, body: body ? JSON.stringify(body) : undefined });
      const data = await res.json();
      if (!res.ok) throw new Error(data?.detail || data?.reason || data?.error || res.statusText);
      return data;
    }

    // Login
    $('login-btn').onclick = async () => {
      status($('login-status'), 'Signing in...', 'load');
      try {
        const data = await api('POST', '/api/auth/login', {
          username: $('login-user').value.trim(),
          password: $('login-pass').value
        });
        if (data.profile?.role !== 'admin') {
          status($('login-status'), 'Admin only', 'err');
          return;
        }
        TOKEN = data.access_token;
        $('login-view').classList.add('hidden');
        $('admin-view').classList.remove('hidden');
        $('header-user').textContent = (data.profile?.username || 'admin');
        $('header-user').classList.remove('hidden');
        $('logout-btn').classList.remove('hidden');
        status($('login-status'), '', '');
        refreshDashboard();
      } catch (e) {
        status($('login-status'), e.message, 'err');
      }
    };
    $('login-pass').addEventListener('keydown', e => { if (e.key === 'Enter') $('login-btn').click(); });

    $('logout-btn').onclick = () => {
      TOKEN = null;
      $('admin-view').classList.add('hidden');
      $('login-view').classList.remove('hidden');
      $('header-user').classList.add('hidden');
      $('logout-btn').classList.add('hidden');
    };

    // Navigation
    document.querySelectorAll('#nav-tabs button').forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll('#nav-tabs button').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        $('page-' + btn.dataset.page).classList.add('active');
        if (btn.dataset.page === 'dashboard') refreshDashboard();
        if (btn.dataset.page === 'queue') refreshQueue();
        if (btn.dataset.page === 'health') refreshHealth();
      };
    });

    let editState = null;

    function editRow(id, username, tokens, role) {
      if (editState === id) return;
      editState = id;
      const tokensCell = document.querySelector(`.cell-tokens[data-id="${id}"]`);
      const roleCell = document.querySelector(`.cell-role[data-id="${id}"]`);
      tokensCell.innerHTML = `<div class="edit-inline"><input type="number" id="edit-tokens-${id}" value="${tokens}" min="0" /></div>`;
      roleCell.innerHTML = `<div class="edit-inline">
        <select id="edit-role-${id}">
          <option value="normal" ${role === 'normal' ? 'selected' : ''}>normal</option>
          <option value="admin" ${role === 'admin' ? 'selected' : ''}>admin</option>
        </select>
        <button class="btn-save" onclick="saveRow('${id}')">Save</button>
        <button class="btn-cancel" onclick="cancelEdit('${id}', ${tokens}, '${role}')">Cancel</button>
      </div>`;
    }

    function cancelEdit(id, tokens, role) {
      editState = null;
      const tokensCell = document.querySelector(`.cell-tokens[data-id="${id}"]`);
      const roleCell = document.querySelector(`.cell-role[data-id="${id}"]`);
      const roleClass = role === 'admin' ? 'admin' : '';
      tokensCell.innerHTML = tokens;
      roleCell.innerHTML = `<span class="badge ${roleClass}">${role}</span>`;
    }

    async function saveRow(id) {
      const newTokens = parseInt(document.getElementById(`edit-tokens-${id}`).value) || 0;
      const newRole = document.getElementById(`edit-role-${id}`).value;
      editState = null;
      try {
        const data = await api('POST', '/api/admin/update-user', { user_id: id, token_balance: newTokens, role: newRole });
        if (data.ok) { refreshDashboard(); status($('dash-status'), 'Updated', 'ok'); }
      } catch (e) {
        cancelEdit(id, newTokens, newRole);
        status($('dash-status'), e.message, 'err');
      }
    }

    async function refreshDashboard() {
      status($('dash-status'), 'Loading...', 'load');
      try {
        const data = await api('GET', '/api/admin/users');
        const users = data.users || [];
        let html = '<table class="admin-table"><thead><tr><th>Username</th><th>Tokens</th><th>Role</th><th>Created</th><th></th></tr></thead><tbody>';
        users.forEach(u => {
          const created = u.created_at ? u.created_at.slice(0, 10) : '—';
          const roleClass = u.role === 'admin' ? 'admin' : '';
          html += `<tr id="row-${u.id}">
            <td><b>${u.username || '?'}</b></td>
            <td class="cell-tokens" data-id="${u.id}">${u.token_balance ?? 0}</td>
            <td class="cell-role" data-id="${u.id}"><span class="badge ${roleClass}">${u.role || 'normal'}</span></td>
            <td>${created}</td>
            <td><button class="btn-edit" onclick="editRow('${u.id}', '${u.username}', ${u.token_balance ?? 0}, '${u.role || 'normal'}')">Edit</button></td>
          </tr>`;
        });
        html += '</tbody></table>';
        $('dash-table').innerHTML = html;
        status($('dash-status'), users.length + ' users', 'ok');
      } catch (e) {
        status($('dash-status'), e.message, 'err');
      }
    }

    async function refreshHealth() {
      try {
        const h = await fetch(API + '/api/health').then(r => r.json());
        $('health-info').innerHTML = `
          <span><span class="status-dot green"></span> Service: <b>${h.service}</b></span>
          <span><span class="status-dot ${h.farm_busy ? 'red' : 'green'}"></span> Farm: <b>${h.farm_busy ? 'Busy' : 'Available'}</b></span>
          <span><span class="status-dot ${h.supabase_configured ? 'green' : 'red'}"></span> Supabase: <b>${h.supabase_configured ? 'OK' : 'Not configured'}</b></span>
          <span><span class="status-dot ${h.service_role_configured ? 'green' : 'red'}"></span> Service Role: <b>${h.service_role_configured ? 'OK' : 'Not configured'}</b></span>
        `;
      } catch (e) {
        $('health-info').innerHTML = '<span style="color:#f87171">Failed: ' + e.message + '</span>';
      }
    }

    async function refreshQueue() {
      status($('queue-status'), 'Loading...', 'load');
      try {
        const q = await api('GET', '/api/admin/queue');
        if (q.ok) {
          let html = '';
          if (q.farm_busy) html += '<div style="color:#f87171;margin-bottom:10px;font-weight:600">Farm is running</div>';
          if (q.current) {
            const sec = q.current.turn_expires?.remaining_sec ?? 0;
            const min = Math.floor(sec / 60);
            const s = sec % 60;
            html += `<div style="background:rgba(30,41,59,0.6);border-radius:10px;padding:12px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center">
              <b>Current:</b> ${q.current.username || q.current.user_id?.slice(0,8)}
              <span style="color:#64748b;font-size:0.8rem">${min}:${String(s).padStart(2,'0')} remaining</span>
            </div>`;
          }
          if (q.queue && q.queue.length > 0) {
            html += '<table class="admin-table"><thead><tr><th>#</th><th>Username</th><th>Joined</th></tr></thead><tbody>';
            q.queue.forEach(u => {
              const joined = u.joined_at ? u.joined_at.slice(11, 19) : '—';
              html += `<tr><td>${u.position}</td><td>${u.username || u.user_id?.slice(0,8)}</td><td>${joined}</td></tr>`;
            });
            html += '</tbody></table>';
          } else if (!q.current) {
            html += '<div style="color:#22d3ee">Queue is empty</div>';
          }
          if (q.last_done && q.last_done.length > 0) {
            html += '<div style="margin-top:12px;color:#64748b;font-size:0.75rem">Recent: ' +
              q.last_done.slice(0, 3).map(d => d.username + ' ' + (d.done_at?.slice(11,19) || '')).join(', ') + '</div>';
          }
          $('queue-info').innerHTML = html || '<div style="color:#64748b">No data</div>';
          status($('queue-status'), (q.queue?.length || 0) + ' in queue', 'ok');
        }
      } catch (e) {
        $('queue-info').textContent = e.message;
        status($('queue-status'), 'Error', 'err');
      }
    }

    // Token actions
    async function tokenAction(amount) {
      status($('token-status'), 'Processing...', 'load');
      try {
        const data = await api('POST', '/api/admin/add-tokens', { query: $('t-username').value.trim(), amount });
        const act = amount > 0 ? 'Added' : 'Removed';
        status($('token-status'), act + ' ' + data.username + ' (Balance: ' + data.token_balance + ')', 'ok');
      } catch (e) {
        status($('token-status'), e.message, 'err');
      }
    }
    $('t-add-btn').onclick = () => tokenAction(parseInt($('t-amount').value) || 0);
    $('t-remove-btn').onclick = () => tokenAction(-(parseInt($('t-amount').value) || 0));

    // Voucher settings
    async function loadVoucherSettings() {
      try {
        const data = await api('/api/admin/voucher-settings');
        if (data.ok) {
          $('vs-phone').value = data.phone || '0644718725';
          $('vs-points').value = data.points_per_baht || 1;
        }
      } catch (_) {}
    }
    loadVoucherSettings();
    $('vs-save-btn').onclick = async () => {
      const btn = $('vs-save-btn');
      const st = $('voucher-settings-status');
      btn.disabled = true;
      status(st, 'Saving...', 'load');
      try {
        const data = await api('/api/admin/voucher-settings', {
          method: 'POST',
          body: {
            phone: $('vs-phone').value.trim(),
            points_per_baht: parseInt($('vs-points').value) || 1
          }
        });
        status(st, 'Saved: phone=' + data.phone + ', ' + data.points_per_baht + ' pt/baht', 'ok');
      } catch (e) {
        status(st, e.message, 'err');
      }
      btn.disabled = false;
    };
  </script>
</body>
</html>

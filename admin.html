<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>hotdog. — Admin</title>
<meta name="color-scheme" content="dark" />
<meta name="theme-color" content="#0b1120" />
<link rel="icon" href="assets/znight.png" type="image/png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/glass-theme.css" />
<link rel="stylesheet" href="css/styles.css" />
<style>
.auth-error { color: var(--danger); font-size: .85rem; padding: 8px; }
.lookup-card { background: rgba(0,0,0,0.15); border-radius: 10px; padding: 14px; font-size: .82rem; border: 1px solid var(--glass-border); }
.lookup-card .row { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 12px; }
.code-display { font-family: 'Space Mono', monospace; font-size: 1.1rem; background: rgba(0,0,0,0.3); padding: 12px 16px; border-radius: 8px; text-align: center; letter-spacing: 2px; color: var(--primary-light); border: 1px dashed var(--glass-border); word-break: break-all; }
.section-title { font-family: var(--display); font-size: 1.05rem; font-weight: 600; margin: 0 0 12px; color: var(--text-primary); display: flex; align-items: center; gap: 8px; }
.section-title img { width: 22px; height: 22px; }
</style>
</head>
<body>
<div class="bg-orbs" aria-hidden="true"><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div><div class="dots"></div></div>

<div class="dashboard">
  <aside class="sidebar hidden" id="sidebar">
    <div class="sidebar-header">
      <img class="sidebar-logo" src="assets/znight.png" alt="" width="40" height="40" />
      <div><div class="sidebar-title">hotdog.</div><div class="sidebar-sub">Admin Panel</div></div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">
        <div class="nav-section-title">Management</div>
        <ul style="list-style:none;padding:0;margin:0">
          <li class="nav-item"><button class="nav-link active" data-page="dashboard"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Users</button></li>
          <li class="nav-item"><button class="nav-link" data-page="tokens"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>Tokens</button></li>
          <li class="nav-item"><button class="nav-link" data-page="codes"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M9 12h6"/></svg>Redeem Codes</button></li>
          <li class="nav-item"><button class="nav-link" data-page="queue"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 4h16v16H4z"/><path d="M8 10h8M8 14h6"/></svg>Queue</button></li>
          <li class="nav-item"><button class="nav-link" data-page="health"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>Health</button></li>
        </ul>
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user" id="sidebar-user">
        <img src="assets/znight.png" class="sidebar-user-avatar" alt="" />
        <div><div class="sidebar-user-name" id="header-user">Admin</div><div class="sidebar-user-role">admin</div></div>
      </div>
      <button class="btn btn-ghost btn-sm btn-block" id="logout-btn" style="margin-top:8px">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg> Logout
      </button>
    </div>
  </aside>

  <div class="main-content">
    <header class="topbar">
      <div class="topbar-left"><div class="topbar-stat"><span class="dot cyan"></span>Admin Dashboard</div></div>
      <div class="topbar-right"><span id="header-user-name" style="color:var(--text-secondary);font-size:.82rem"></span></div>
    </header>

    <main class="shell">
      <section id="login-view" class="view">
        <div class="admin-hero">
          <img src="assets/znight.png" width="100" height="100" alt="" style="margin:0 auto 16px;filter:drop-shadow(0 0 20px rgba(14,165,233,0.4))" />
          <h1>hotdog.</h1><p>Management Dashboard &mdash; Admin only</p>
        </div>
        <div style="max-width:400px;margin:0 auto">
          <div class="glass-card">
            <h2 class="card-title" style="justify-content:center;margin-bottom:6px">Sign In</h2>
            <p class="card-subtitle" style="margin-bottom:16px">Enter admin credentials</p>
            <label class="field"><span>Username</span><input id="login-user" type="text" value="admin" autocomplete="off" /></label>
            <label class="field"><span>Password</span><input id="login-pass" type="password" autocomplete="off" /></label>
            <button class="btn btn-primary btn-block" id="login-btn"><img src="assets/icon_giftpoint.png" alt="" width="18" height="18" /> Sign In</button>
            <p id="login-status" class="card-subtitle" style="margin-top:8px;min-height:1.2em"></p>
          </div>
        </div>
      </section>

      <section id="admin-view" class="view hidden">
        <!-- Users -->
        <div id="page-dashboard" class="tab-content active">
          <div class="page-header"><h1>Users</h1></div>
          <div id="dash-status" class="card-subtitle" style="margin-bottom:12px;min-height:1.2em"></div>
          <div class="glass-card" style="padding:16px;overflow-x:auto"><div id="dash-table"></div></div>
        </div>

        <!-- Tokens -->
        <div id="page-tokens" class="tab-content">
          <div class="page-header"><h1>Token Management</h1></div>
          <div class="admin-grid">
            <div class="glass-card">
              <div class="card-title" style="margin-bottom:16px"><img src="assets/coin.png" alt="" />Add / Remove Tokens</div>
              <div id="token-status" class="card-subtitle" style="min-height:1.2em;margin-bottom:12px"></div>
              <label class="field"><span>Username</span><input type="text" id="t-username" placeholder="Enter username" /></label>
              <label class="field"><span>Amount</span><input type="number" id="t-amount" value="10" min="1" /></label>
              <div class="grid-2" style="margin-top:4px">
                <button class="btn btn-primary" id="t-add-btn">Add Tokens</button>
                <button class="btn btn-danger" id="t-remove-btn">Remove Tokens</button>
              </div>
            </div>
            <div class="glass-card">
              <div class="card-title" style="margin-bottom:16px"><img src="assets/icon_giftpoint.png" alt="" />Voucher Settings</div>
              <div id="voucher-settings-status" class="card-subtitle" style="min-height:1.2em;margin-bottom:12px"></div>
              <label class="field"><span>TrueMoney Phone</span><input type="text" id="vs-phone" placeholder="0644718725" /></label>
              <label class="field"><span>Points per 1 Baht</span><input type="number" id="vs-points" min="1" max="1000" placeholder="1" /></label>
              <button class="btn btn-primary btn-block" id="vs-save-btn" style="margin-top:4px">Save Settings</button>
            </div>
          </div>
        </div>

        <!-- Redeem Codes -->
        <div id="page-codes" class="tab-content">
          <div class="page-header"><h1>Redeem Codes</h1></div>
          <div class="admin-grid">
            <div class="glass-card">
              <div class="card-title" style="margin-bottom:16px"><img src="assets/icon_giftpoint.png" alt="" />Generate Code</div>
              <div id="code-status" class="card-subtitle" style="min-height:1.2em;margin-bottom:12px"></div>
              <label class="field"><span>Token Amount</span><input type="number" id="code-tokens" value="10" min="1" max="100000" /></label>
              <label class="field"><span>Max Uses</span><input type="number" id="code-max-uses" value="1" min="1" max="10000" /></label>
              <label class="field"><span>Custom Code (optional, leave blank for auto)</span><input type="text" id="code-custom" placeholder="e.g. BONUS50" style="text-transform:uppercase" /></label>
              <button class="btn btn-primary btn-block" id="code-generate-btn"><img src="assets/coin.png" alt="" width="18" height="18" /> Generate Code</button>
              <div id="code-result" class="hidden" style="margin-top:16px">
                <p style="font-size:.82rem;color:var(--text-muted);margin-bottom:6px">Generated Code:</p>
                <div class="code-display" id="code-display"></div>
                <button class="btn btn-secondary btn-sm btn-block" id="code-copy-btn" style="margin-top:8px">Copy Code</button>
              </div>
            </div>
            <div class="glass-card">
              <div class="card-title" style="margin-bottom:16px"><img src="assets/tr_ga170.png" alt="" />Recent Codes</div>
              <div id="codes-list-status" class="card-subtitle" style="min-height:1.2em;margin-bottom:12px"></div>
              <div style="overflow-x:auto;font-size:.82rem"><div id="codes-list"></div></div>
            </div>
          </div>
        </div>

        <!-- Queue -->
        <div id="page-queue" class="tab-content">
          <div class="page-header"><h1>Farm Queue</h1></div>
          <div id="queue-status" class="card-subtitle" style="min-height:1.2em;margin-bottom:12px"></div>
          <div class="glass-card" style="padding:16px"><div id="queue-info" style="font-size:.85rem"></div></div>
        </div>

        <!-- Health -->
        <div id="page-health" class="tab-content">
          <div class="page-header"><h1>System Health</h1></div>
          <div class="glass-card" style="padding:16px"><div id="health-info" class="health-grid"></div></div>
        </div>
      </section>
    </main>
  </div>
</div>

<div class="mobile-toggle" id="mobile-toggle" aria-label="Toggle menu"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></div>

<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
<script src="js/config.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
